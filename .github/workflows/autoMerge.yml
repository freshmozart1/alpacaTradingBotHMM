name: Enable Auto Merge

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: number

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge
        run: |
          PR="${{ github.event.pull_request.number || inputs.pr }}"
          gh pr merge "$PR" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
